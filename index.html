<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      /* Extra layer against pinch-zoom, for browsers that ignore the
         viewport meta's user-scalable=no. Not a hard guarantee — some
         browsers still allow zoom for accessibility reasons. */
      html, body {
        touch-action: pan-x pan-y;
      }
      /* Default to black instead of the browser's white canvas so there's
         no white flash before the app (and its black loading screen) mounts. */
      html, body {
        background: #131313;
        margin: 0;
      }
      #root {
        min-height: 100vh;
      }
    </style>
    <title>R Journal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
